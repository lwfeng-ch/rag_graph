# 智能医疗分诊系统 - Docker Compose 配置（适配优化版）
# 多服务编排：FastAPI + Qdrant + PostgreSQL

version: '3.8'

services:
  # ===== FastAPI 应用服务 =====
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-triage-api
    restart: always
    ports:
      - "8012:8012"
    environment:
      # 数据库配置
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-rag_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rag_password}
      - POSTGRES_DB=${POSTGRES_DB:-rag_db}
      
      # Qdrant 配置
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      
      # LLM 配置（从 .env 文件读取）
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      
      # 服务配置
      - DEV_MODE=${DEV_MODE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    
    volumes:
      # 日志持久化
      - ./logs:/app/logs
      # 输出文件持久化
      - ./output:/app/output
      # 输入文件持久化
      - ./input:/app/input
      # 用户医疗文档存储
      - ./user_medical_docs:/app/user_medical_docs
    
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    
    networks:
      - medical-triage-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # 资源限制（防止内存泄漏）
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  # ===== Qdrant 向量数据库 =====
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # Gradio API
    volumes:
      - ./qdrantDB:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=${QDRANT_LOG_LEVEL:-INFO}
      - QDRANT__SERVICE__GRPC_PORT=6334
    
    networks:
      - medical-triage-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # ===== PostgreSQL 数据库（会话持久化）=====
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-rag_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rag_password}
      - POSTGRES_DB=${POSTGRES_DB:-rag_db}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-compose/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    
    networks:
      - medical-triage-network
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_user} -d ${POSTGRES_DB:-rag_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

# ===== 网络配置 =====
networks:
  medical-triage-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ===== 数据卷 =====
volumes:
  postgres_data:
    driver: local
    name: medical-triage-postgres-data
  qdrant_data:
    driver: local
    name: medical-triage-qdrant-data
