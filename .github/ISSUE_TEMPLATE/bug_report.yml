name: Bug Report
description: Create a report to help us improve
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    id: description
    attributes:
      label: Description
      description: Please describe the bug in detail
      placeholder: |
        Describe the bug here...
        
        **Expected behavior:**
        
        **Actual behavior:**
        
        **Steps to reproduce:**
        1.
        2.
        3.
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: Version
      description: Which version of the project are you using?
      options:
        - Latest (master)
        - v1.x.x
        - Development version
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: What Python version are you using?
      placeholder: e.g., 3.10, 3.11
    validations:
      required: false

  - type: input
    id: operating-system
    attributes:
      label: Operating System
      description: What operating system are you using?
      placeholder: e.g., Windows 11, macOS 14, Ubuntu 22.04
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please paste any relevant log output here
      placeholder: |
        ```
        Paste your logs here...
        ```
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: |
        Add any additional context...
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched the existing issues
          required: true
        - label: I have read the documentation
          required: true
        - label: I have provided all required information
          required: true
